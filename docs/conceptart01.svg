<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">Heroes of NVVH koncept-art</title>
  <desc id="desc">Rajzfilmes, arcade jellegű koncept-art a Heroes of NVVH játékhoz, 7x6-os városi pályával, külső speciális pontokkal, karakterekkel, loot-tal és humoros hangulattal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9fd6ff"/>
      <stop offset="100%" stop-color="#dff4ff"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fa0ad"/>
      <stop offset="100%" stop-color="#6d7d89"/>
    </linearGradient>
    <linearGradient id="roadCell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#95a4ae"/>
      <stop offset="100%" stop-color="#7c8b96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
    <style>
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #18324a; }
      .small { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #20445f; }
      .tiny { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #ffffff; letter-spacing: 1px; }
      .outline { stroke: #243746; stroke-width: 4; stroke-linejoin: round; }
      .gridline { stroke: rgba(255,255,255,0.25); stroke-width: 2; }
      .arrow { stroke: #244864; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .comic { font: 900 30px 'Segoe UI', Arial, sans-serif; fill: #ffffff; stroke: #243746; stroke-width: 3; paint-order: stroke; }
    </style>
  </defs>

